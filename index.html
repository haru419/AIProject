<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ミライAI</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div id="app">

    <header>

        <div id="avatar">
            👧
        </div>

        <div id="profile">

            <h1>ミライAI</h1>

            <div id="status">

                ❤️ 好感度
                <span id="love">0</span>

            </div>

        </div>

    </header>

    <main id="chat">

    </main>

    <div id="bottom">

        <button id="voiceBtn">
            🎤
        </button>

        <input
            id="msg"
            type="text"
            placeholder="メッセージを入力..."
        >

        <button
            id="sendBtn"
            onclick="sendMessage()"
        >
            送信
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
